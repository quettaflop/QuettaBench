# Authoritative benchmark sweep matrix.
#
# Single source of truth consumed by:
#   - scripts/compile_sweep.py       → emits structured JSON manifests or legacy row streams
#   - scripts/bench_orchestrator.sh  → compiles a fresh scoped manifest, dispatches jobs, publishes sweep-state.json to R2
#   - dashboard/src/components/CoveragePage.tsx → reads sweep-state.json for live cell status
#
# DO NOT edit generated bench_jobs artifacts directly — they are generated from this file.
# To add/remove a sweep row, edit `cells` below and run:
#     python scripts/compile_sweep.py --scope synthetic_distributional --format json --out /tmp/bench_jobs/bench_jobs.synthetic_distributional.json
#
# A cell is (host, model, tp, mode). The compiler:
#   1. Skips cells in `known_oom` (dashboard shows them as OOM).
#   2. Skips cells where weights_gb > host.vram_gb_per_gpu × tp × feasibility_ratio
#      (dashboard shows them as infeasible via the same rule).
#   3. Emits every remaining cell as a structured job record.

# --------------------------------------------------------------------------
# Hardware
# --------------------------------------------------------------------------
hosts:
  a100:
    hardware_label: A100-40GB    # base label; dashboard adds x<TP> suffix for TP>1
    model_root: /data/models
    python: /data/kevinlau/miniconda3/bin/python
    python_sglang: /data/kevinlau/miniconda3/envs/sglang/bin/python
    total_gpus: 8
    vram_gb_per_gpu: 40

  3090:
    hardware_label: "3090"
    model_root: /home/kevinlau/models
    python: /home/kevinlau/miniconda3/envs/vllm/bin/python
    python_sglang: /home/kevinlau/miniconda3/envs/sglang/bin/python
    total_gpus: 8
    vram_gb_per_gpu: 24

  2080ti:
    hardware_label: 2080Ti
    model_root: /home/kevinlau/models
    python: /home/kevinlau/miniconda3/envs/vllm/bin/python
    python_sglang: /home/kevinlau/miniconda3/envs/sglang/bin/python
    total_gpus: 8
    vram_gb_per_gpu: 22
    # 2080Ti has shared GPUs — pin to specific device IDs per run via cell.extra_env.

  h100:
    hardware_label: H100
    model_root: /data/kevinlau/models
    python: /data/kevinlau/miniconda3/envs/vllm/bin/python
    python_sglang: /data/kevinlau/miniconda3/envs/sglang/bin/python
    total_gpus: 8
    vram_gb_per_gpu: 80
    # /data is shared with 9 other users (750G free / 6.9T); keep working
    # set lean and delete each model after its sweep completes.


# --------------------------------------------------------------------------
# Models
# --------------------------------------------------------------------------
# weights_gb = bf16 size (2 bytes per param; MoE = all-experts resident
# since vLLM needs every expert in VRAM regardless of activation sparsity).
models:
  Llama-3.1-8B:    { dir: Llama-3.1-8B-Instruct,   weights_gb: 16 }
  Llama-3.1-70B:   { dir: Llama-3.1-70B-Instruct,  weights_gb: 140 }
  Llama-3.3-70B:   { dir: Llama-3.3-70B-Instruct,  weights_gb: 140 }
  Mixtral-8x7B:    { dir: Mixtral-8x7B-Instruct,   weights_gb: 94, moe: true }
  Qwen2.5-72B:     { dir: Qwen2.5-72B-Instruct,    weights_gb: 144 }
  Qwen3.5-9B:      { dir: Qwen3.5-9B,              weights_gb: 18 }
  Qwen3.5-27B:     { dir: Qwen3.5-27B,             weights_gb: 54 }
  # Qwen3-30B-A3B: Qwen3 MoE, 128 experts / 8 active per token (ideal EP case).
  Qwen3-30B-A3B:   { dir: Qwen3-30B-A3B,           weights_gb: 60, moe: true }
  # gpt-oss-* uses native MXFP4 storage (~4 bits/param), not bf16.
  gpt-oss-20b:     { dir: gpt-oss-20b,             weights_gb: 12, moe: true }
  gpt-oss-120b:    { dir: gpt-oss-120b,            weights_gb: 65, moe: true }

# --------------------------------------------------------------------------
# Sweep presets (referenced by cells below)
# --------------------------------------------------------------------------
presets:
  single_small:
    max_len: 32768
    gpu_mem: 0.85
    concurrencies: [1, 10, 20, 40, 80, 160, 256, 320]
    profiles: [chat-singleturn, coding-singleturn]
  single_medium:
    max_len: 16384
    gpu_mem: 0.85
    concurrencies: [1, 10, 20, 40, 80, 160, 256, 320]
    profiles: [chat-singleturn]
  single_large:
    max_len: 8192
    gpu_mem: 0.90
    concurrencies: [1, 10, 20, 40, 80, 160, 256, 320]
    profiles: [chat-singleturn]
  single_tight:
    max_len: 4096
    gpu_mem: 0.92
    concurrencies: [1, 10, 20, 40, 80, 160, 256, 320]
    profiles: [chat-singleturn]
  multi_small:
    max_len: 32768
    gpu_mem: 0.85
    # Multi-turn TPOT/throughput plateaus early; keep the paper grid lean.
    concurrencies: [5, 20, 40, 80, 160]
    profiles: [chat-multiturn, swebench-multiturn, terminalbench-multiturn, osworld-multiturn]
  multi_medium:
    max_len: 8192
    gpu_mem: 0.85
    concurrencies: [5, 20, 40, 80, 160]
    profiles: [chat-multiturn, swebench-multiturn, terminalbench-multiturn, osworld-multiturn]
  multi_tight:
    max_len: 8192
    gpu_mem: 0.85
    concurrencies: [5, 20, 40, 80, 160]
    profiles: [chat-multiturn, swebench-multiturn, terminalbench-multiturn, osworld-multiturn]
  fixed_single:
    max_len: 32768
    gpu_mem: 0.85
    concurrencies: [200, 320]
    profiles: [chat-singleturn]
  fixed_multi:
    max_len: 32768
    gpu_mem: 0.85
    concurrencies: [200, 320]
    profiles: [chat-multiturn, swebench-multiturn, terminalbench-multiturn, osworld-multiturn]
  mse_multi:
    max_len: 32768
    gpu_mem: 0.85
    concurrencies: [40, 80]
    profiles: [swebench-multiturn-mse, terminalbench-multiturn-mse, osworld-multiturn-mse, swebench-multiturn-short, terminalbench-multiturn-short, osworld-multiturn-short]

# --------------------------------------------------------------------------
# Feasibility rule (mirrors CoveragePage.tsx checkFeasibility)
# --------------------------------------------------------------------------
# A cell is feasible iff:  weights_gb <= vram_gb_per_gpu × tp × feasibility_ratio
# Infeasible cells are NOT emitted to generated job manifests. They still show on the
# dashboard with reason: "needs ≥X GB VRAM (weights Y GB); config has Z GB".
# 0.90 allows 70B/72B tp4 on A100-40GB (empirically works with our
# VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1 + gpu_mem=0.95 config).
feasibility_ratio: 0.90

# --------------------------------------------------------------------------
# Known-OOM combos (structural failures the feasibility rule doesn't catch)
# --------------------------------------------------------------------------
# These cells are skipped by the compiler AND flagged as "OOM" on the dashboard
# with the given reason. Use this for stack-level bugs (e.g. vLLM kernel issues)
# that won't be fixed by config tuning.
#
# `kind: hw_permanent | sw_fixable` classifies WHY the cell can't run so the
# dashboard can color a permanent hardware limit (blue/slate) differently from a
# fixable software/env gap (yellow):
#   hw_permanent = the GPU physically can't (arch / compute capability; never fixable).
#   sw_fixable   = env/software gap (rebuild/upgrade the stack, bump a limit).
# Omitting `kind` defaults to hw_permanent (auto VRAM-feasibility skips are
# hardware limits).
known_oom:
  # A100 is sm80 (Ampere) and fully capable; the hybrid-attn Triton kernel fault
  # is a stack-level bug fixable by a vLLM upgrade, not a hardware limit.
  - { host: a100, model: Qwen3.5-27B, tp: 2, backend: vllm, reason: "hybrid-attn triton", kind: sw_fixable }
  - { host: a100, model: Qwen3.5-27B, tp: 4, backend: vllm, reason: "hybrid-attn triton", kind: sw_fixable }
  # gpt-oss-* is natively MXFP4-quantized; MXFP4 kernels require sm80+ (Ampere).
  # 2080Ti is Turing (sm75) — no hardware support. Dequantizing to bf16 would
  # make it a different artifact (40 GB vs 12 GB) that wouldn't fit tp1 anyway.
  - { host: 2080ti, model: gpt-oss-20b, tp: 1, reason: "MXFP4 needs sm80+; 2080Ti is sm75 (Turing, no hw support)", kind: hw_permanent }
  - { host: 2080ti, model: gpt-oss-20b, tp: 2, reason: "MXFP4 needs sm80+; 2080Ti is sm75 (Turing, no hw support)", kind: hw_permanent }
  - { host: 2080ti, model: gpt-oss-20b, tp: 4, reason: "MXFP4 needs sm80+; 2080Ti is sm75 (Turing, no hw support)", kind: hw_permanent }
  - { host: 2080ti, model: gpt-oss-120b, tp: 4, reason: "MXFP4 needs sm80+; 2080Ti is sm75 (Turing, no hw support)", kind: hw_permanent }

# --------------------------------------------------------------------------
# Profile-level infeasible combos
# --------------------------------------------------------------------------
# These rules remove only the matching profiles from generated jobs and mark
# the affected coverage cells as N/A. Use this when a profile is structurally
# impossible for a launch shape even though other profiles in the same
# host/model/tp/mode/backend cell are runnable.
#
# `kind: hw_permanent | sw_fixable` classifies WHY each rule blocks (same
# semantics as known_oom above): hw_permanent = GPU arch limit (blue/slate on
# the dashboard); sw_fixable = env/software gap fixable by a rebuild/upgrade or a
# bigger max_len (yellow). Omitting `kind` defaults to hw_permanent.
profile_infeasible:
  - profiles: [swebench-multiturn, terminalbench-multiturn]
    mode: multi
    max_len_lt: 32768
    reason: "context too short for long multi-turn traces; requires max_len=32768"
    kind: sw_fixable

  # sglang 0.5.9 custom CUDA ops (RMSNorm, GemmaRMSNorm, CUDA graphs)
  # have no sm75 (Turing) kernel images. 2080Ti sglang is fundamentally
  # unsupported without rebuilding sglang from source for sm75.
  - host: 2080ti
    backend: sglang
    profiles:
      - chat-singleturn
      - coding-singleturn
      - chat-multiturn
      - swebench-multiturn
      - terminalbench-multiturn
      - osworld-multiturn
    reason: "sglang 0.5.9 custom ops lack sm75 (Turing) kernels; rebuild from source required"
    kind: sw_fixable

  # (resolved 2026-07-15) h100 gpt-oss now runs on vLLM 0.19.1 via host_python
  # model-aware routing; the 0.19.0 MXFP4-MoE startup crash (tp1 dense +
  # tp2/tp4 EP) no longer applies. Verified tp1 and tp2 start + serve on 0.19.1.

